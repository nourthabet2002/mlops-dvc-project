name: CI - DVC + AWS + CML

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions: write-all

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up CML
        uses: iterative/setup-cml@v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[s3]==3.63.0"
          dvc --version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: DVC pull (restore data/models)
        run: dvc pull -v || echo "No remote cache yet"

      - name: Train + version outputs + push to S3
        run: |
          python script.py

          # Track updated outputs
          dvc add data models

          # Commit DVC metadata back to GitHub
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add data.dvc models.dvc || true
          [ -f dvc.lock ] && git add dvc.lock

          git commit -m "Update data/models [skip ci]" || echo "nothing to commit"

          # Push artifacts (blobs) to S3
          dvc push -v

      - name: Publish CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Metrics" > report.md
          cat metrics.txt >> report.md
          echo "" >> report.md
          echo "## Confusion Matrix" >> report.md
          echo "![](./conf_matrix.png)" >> report.md

          # Prefer PR comment; fallback to commit comment
          cml comment create --pr report.md || cml comment create --commit-sha "$GITHUB_SHA" report.md
